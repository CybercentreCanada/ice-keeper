version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: "%(asctime)s - %(levelname)s - %(message)s"
    datefmt: "%m/%d/%Y %I:%M:%S %p"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

loggers:
  ice-keeper:
    level: INFO
    handlers: [console]
    propagate: no

root:
  level: INFO
  handlers: [console]